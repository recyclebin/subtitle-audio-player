name: tingjian
description: 听见 — 字幕音频播放器，专为精听训练设计：可调速、单句循环、字幕延迟显示。
version: 1.1.8+10

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.5
  # 精确钉版：MyAudioHandler.dispose() 不是 @override（BaseAudioHandler 当前没有
  # 这个方法）。若 audio_service 在小版本里加了 dispose，override 契约会悄悄破裂，
  # 须人工核对再升级。
  audio_service: 0.18.18
  audio_session: ^0.2.0
  file_picker: ^11.0.2
  path: ^1.8.3
  shared_preferences: ^2.2.2
  flutter_charset_detector: ^5.0.0
  rxdart: ^0.28.0
  record: ^6.0.0
  http: ^1.2.2
  path_provider: ^2.1.4
  uuid: ^4.5.1
  flutter_langdetect: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
